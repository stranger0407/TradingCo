version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: tradingco-postgres
    environment:
      POSTGRES_DB: tradingco
      POSTGRES_USER: tradingco
      POSTGRES_PASSWORD: tradingco_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingco"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tradingco-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
