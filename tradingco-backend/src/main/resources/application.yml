server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tradingco
    username: tradingco
    password: tradingco_dev
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:mySecretKeyForDevelopmentOnlyChangeInProduction2024!@#$%}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

logging:
  level:
    com.tradingco: DEBUG

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

cors:
  allowed-origins: http://localhost:5173,https://tradingco-frontend.vercel.app
